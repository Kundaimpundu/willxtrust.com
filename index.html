<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WillXTrust</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f5f2;
      color: #1a1a1a;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: white;

      max-width: 700px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>WillXTrust is live</h1>
    <p>Your domain is connected and GitHub Pages is working.</p>
  </div>
</body>
</html>
